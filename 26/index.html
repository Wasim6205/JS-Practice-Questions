<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Document</title>
</head>
<body class="bg-black flex justify-center items-center h-screen w-full">
    
    <div id="form" class="flex flex-col gap-2 bg-white w-[50%] p-4">
        <input id="nameInput" type="text" required placeholder="Name" class="border-2 rounded-md outline-none p-2">
        <input id="emailInput" type="email" required placeholder="Email" class="border-2 rounded-md outline-none p-2">
        <button class="py-2 px-4 bg-blue-500 w-fit m-auto text-white rounded-md cursor-pointer">submit</button>
    </div>

    <script src="script.js"></script>
</body>
</html>

<!-- Mini Student Manager -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Document</title>
</head>
<body class="bg-black text-white h-screen w-full p-4">
    <div class="flex flex-col gap-4 items-center justify-center">
        <input id="name" placeholder="Name" class="outline-none border border-gray-400 rounded-md w-[40%] p-3">
        <input id="course" placeholder="Course" class="outline-none border border-gray-400 rounded-md w-[40%] p-3">
        <button id="add" class="p-3 active:scale-95 rounded-md bg-blue-400 cursor-pointer">Add Student</button>
        <h1 class="text-white">Total Students : <span id="count">0</span></h1>
        <div id="students" class="flex flex-wrap gap-4">
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Click Counter App</title>
</head>
<body class="bg-black h-screen w-full">
    
    <div class="flex flex-col gap-2 justify-center items-center h-full">
        <p class="text-white text-3xl" id="count">0</p>
        <button id="click" class="bg-blue-400 border-none px-4 py-2 cursor-pointer rounded-md text-white">Click Me</button>
        <button id="reset" class="bg-red-400 border-none px-4 py-2 cursor-pointer rounded-md text-white">Reset</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
